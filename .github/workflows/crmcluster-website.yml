name: crmcluster-website-image
on:
  push:
    paths:
      - 'packages/crmcluster-website/**'
      - '.github/workflows/crmcluster-website.yml'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: crmcluster-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/demandcluster/crmcluster-website
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/crmcluster-website/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=crmcluster-website
          cache-to: type=gha,scope=crmcluster-website,mode=max
