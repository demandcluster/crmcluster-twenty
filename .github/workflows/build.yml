name: build-image
on:
  push:
    tags: ['v*']        # build on tag, e.g. v1
  workflow_dispatch: {}  # manual trigger button
permissions:
  contents: read
  packages: write        # lets GITHUB_TOKEN push to GHCR
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(node -p "require('./package.json').version")-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: ghcr.io/demandcluster/crmcluster-twenty:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
